# Cambia prefix da C-b a C-a (più comodo)
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Indice pannelli da 1 invece di 0
set -g base-index 1
setw -g pane-base-index 1

# Split pannelli con | e -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Ricarica config con r
bind r source-file ~/.tmux.conf \; display "Config ricaricata!"

# Navigazione pannelli con Alt+frecce
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Mouse abilitato
set -g mouse on

# Storia lunga
set -g history-limit 10000

# Colori
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Barra di stato
set -g status-bg colour235
set -g status-fg colour136
set -g status-left "#[fg=colour235,bg=colour136,bold] #S "
set -g status-right "#[fg=colour136,bg=colour235] %d/%m %H:%M "
set -g status-right-length 50
set -g status-left-length 30
